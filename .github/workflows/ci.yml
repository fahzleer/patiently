name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Layer 1: Build (SSR regression guard) ───────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Placeholder values — build must pass even without real Firebase
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: https://placeholder-rtdb.firebaseio.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:000000000000"

  # ── Layer 2: Unit Tests ──────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        # Scope to src/ — otherwise bun's built-in runner picks up the
        # tests/e2e/*.spec.ts Playwright files and crashes.
        run: bun test src

  # ── Layer 3: E2E Tests ──────────────────────────────────────────────────────
  # PRs hit their own Vercel preview deployment (isolated per-PR URL, doesn't
  # depend on prod uptime). Pushes to main hit the live prod URL as a post-
  # deploy smoke test. Either way we're testing a real deployed bundle, so no
  # local dev server is needed and no Firebase secrets leak into CI.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build, unit] # only run if build and unit pass
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Wait for Vercel preview deployment
        if: github.event_name == 'pull_request'
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300

      - name: Resolve Playwright base URL
        id: base
        run: |
          if [ -n "${{ steps.preview.outputs.url }}" ]; then
            echo "url=${{ steps.preview.outputs.url }}" >> "$GITHUB_OUTPUT"
            echo "Target: Vercel preview (${{ steps.preview.outputs.url }})"
          else
            echo "url=https://patiently.lightningshot.co" >> "$GITHUB_OUTPUT"
            echo "Target: production smoke test"
          fi

      - name: Run E2E tests
        run: bunx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ steps.base.outputs.url }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
